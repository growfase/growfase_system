name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check server.js

      - name: Verify core files
        shell: bash
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js
          test -f server.js
          test -f design.md
          test -f AGENTS.md
